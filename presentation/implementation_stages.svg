<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080">
<rect width="100%" height="100%" fill="#0C1220"/>
<text x="120" y="140" fill="#F0F5FA" font-size="64" font-weight="700">Этапы внедрения</text>
<text x="120" y="200" fill="#B4D0E5" font-size="24">Как система переходит от MVP к использованию на предприятии</text>

    <rect x="120" y="380" width="360" height="240" rx="25" fill="#1A283C" stroke="#50C8FF" stroke-width="3"/>
    <text x="145" y="440" fill="#FFFFFF" font-size="32" font-weight="700">1. Пилот</text>
    <text x="145" y="490" fill="#C8DCEB" font-size="28">Запуск на архивных данных</text><text x="145" y="526" fill="#C8DCEB" font-size="28">конкретного технологического процесса</text>
        <line x1="490" y1="500" x2="530" y2="500" stroke="#50C8FF" stroke-width="6"/>
        <polygon points="530,500 515,490 515,510" fill="#50C8FF"/>
        
    <rect x="540" y="380" width="360" height="240" rx="25" fill="#1A283C" stroke="#50C8FF" stroke-width="3"/>
    <text x="565" y="440" fill="#FFFFFF" font-size="32" font-weight="700">2. Адаптация</text>
    <text x="565" y="490" fill="#C8DCEB" font-size="28">Настройка параметров</text><text x="565" y="526" fill="#C8DCEB" font-size="28">снижение ложных срабатываний</text><text x="565" y="562" fill="#C8DCEB" font-size="28">учёт особенностей объекта</text>
        <line x1="910" y1="500" x2="950" y2="500" stroke="#50C8FF" stroke-width="6"/>
        <polygon points="950,500 935,490 935,510" fill="#50C8FF"/>
        
    <rect x="960" y="380" width="360" height="240" rx="25" fill="#1A283C" stroke="#50C8FF" stroke-width="3"/>
    <text x="985" y="440" fill="#FFFFFF" font-size="32" font-weight="700">3. Интеграция</text>
    <text x="985" y="490" fill="#C8DCEB" font-size="28">Подключение через API</text><text x="985" y="526" fill="#C8DCEB" font-size="28">встраивание в ИТ-инфраструктуру</text><text x="985" y="562" fill="#C8DCEB" font-size="28">автоматизация анализа</text>
        <line x1="1330" y1="500" x2="1370" y2="500" stroke="#50C8FF" stroke-width="6"/>
        <polygon points="1370,500 1355,490 1355,510" fill="#50C8FF"/>
        
    <rect x="1380" y="380" width="360" height="240" rx="25" fill="#1A283C" stroke="#50C8FF" stroke-width="3"/>
    <text x="1405" y="440" fill="#FFFFFF" font-size="32" font-weight="700">4. Масштабирование</text>
    <text x="1405" y="490" fill="#C8DCEB" font-size="28">Расширение на другие процессы</text><text x="1405" y="526" fill="#C8DCEB" font-size="28">использование в разных подразделениях</text>
<text x="120" y="950" fill="#8CA6BB" font-size="22">От пилота к масштабируемому цифровому решению</text>
</svg>

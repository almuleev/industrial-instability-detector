<text x="95" y="190" font-size="56" font-weight="700" font-family="Arial, Helvetica, sans-serif" fill="#283240">FastAPI /docs</text>
<text x="95" y="240" font-size="28" font-family="Arial, Helvetica, sans-serif" fill="#697382">API для интеграции системы анализа временных рядов во внешний цифровой контур</text>

<rect x="1350" y="145" width="460" height="150" rx="22" fill="#F3FAF8" stroke="#BEDFD8" stroke-width="2"/>
<text x="1380" y="185" font-size="28" font-weight="700" font-family="Arial, Helvetica, sans-serif" fill="#248078">Зачем это нужно</text>
<text x="1380" y="228" font-size="22" font-family="Arial, Helvetica, sans-serif" fill="#465464">• интеграция с внешними системами</text>
<text x="1380" y="258" font-size="22" font-family="Arial, Helvetica, sans-serif" fill="#465464">• автоматический запуск анализа</text>
<text x="1380" y="288" font-size="22" font-family="Arial, Helvetica, sans-serif" fill="#465464">• получение отчётов и метрик</text>

    <rect x="90" y="340" width="1740" height="135" rx="18" fill="#FFFFFF" stroke="#DCE1E8" stroke-width="2"/>
    <rect x="120" y="378" width="110" height="50" rx="14" fill="#4376D4"/>

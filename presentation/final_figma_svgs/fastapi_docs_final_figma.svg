    <text x="145" y="877" font-size="24" font-weight="700" font-family="Arial, Helvetica, sans-serif" fill="#FFFFFF">GET</text>
    <text x="250" y="875" font-size="32" font-weight="700" font-family="Arial, Helvetica, sans-serif" fill="#242E3C">/report</text>
    <text x="250" y="913" font-size="24" font-family="Arial, Helvetica, sans-serif" fill="#64707E">Возврат сформированного отчёта</text>

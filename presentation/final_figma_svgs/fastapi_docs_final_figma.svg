    <text x="250" y="410" font-size="32" font-weight="700" font-family="Arial, Helvetica, sans-serif" fill="#242E3C">/analyze</text>
    <text x="250" y="448" font-size="24" font-family="Arial, Helvetica, sans-serif" fill="#64707E">Запуск полного анализа временного ряда</text>
    <rect x="1635" y="380" width="155" height="48" rx="14" fill="#F8FAFC" stroke="#D2DAE2" stroke-width="2"/>
    <text x="1660" y="412" font-size="22" font-family="Arial, Helvetica, sans-serif" fill="#566271">Try it out</text>
    
    <rect x="90" y="495" width="1740" height="135" rx="18" fill="#FFFFFF" stroke="#DCE1E8" stroke-width="2"/>
    <rect x="120" y="533" width="110" height="50" rx="14" fill="#4376D4"/>
    <text x="145" y="567" font-size="24" font-weight="700" font-family="Arial, Helvetica, sans-serif" fill="#FFFFFF">POST</text>
    <text x="250" y="565" font-size="32" font-weight="700" font-family="Arial, Helvetica, sans-serif" fill="#242E3C">/forecast</text>
    <text x="250" y="603" font-size="24" font-family="Arial, Helvetica, sans-serif" fill="#64707E">Краткосрочный прогноз по выбранному параметру</text>
    <rect x="1635" y="535" width="155" height="48" rx="14" fill="#F8FAFC" stroke="#D2DAE2" stroke-width="2"/>
    <text x="1660" y="567" font-size="22" font-family="Arial, Helvetica, sans-serif" fill="#566271">Try it out</text>
    
    <rect x="90" y="650" width="1740" height="135" rx="18" fill="#FFFFFF" stroke="#DCE1E8" stroke-width="2"/>
    <rect x="120" y="688" width="90" height="50" rx="14" fill="#49B88A"/>
    <text x="145" y="722" font-size="24" font-weight="700" font-family="Arial, Helvetica, sans-serif" fill="#FFFFFF">GET</text>
    <text x="250" y="720" font-size="32" font-weight="700" font-family="Arial, Helvetica, sans-serif" fill="#242E3C">/intervals</text>
    <text x="250" y="758" font-size="24" font-family="Arial, Helvetica, sans-serif" fill="#64707E">Получение найденных интервалов нестабильности</text>
    <rect x="1635" y="690" width="155" height="48" rx="14" fill="#F8FAFC" stroke="#D2DAE2" stroke-width="2"/>
    <text x="1660" y="722" font-size="22" font-family="Arial, Helvetica, sans-serif" fill="#566271">Try it out</text>
    
    <rect x="90" y="805" width="1740" height="135" rx="18" fill="#FFFFFF" stroke="#DCE1E8" stroke-width="2"/>

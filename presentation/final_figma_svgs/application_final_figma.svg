ont-size="34" font-weight="700" font-family="Arial, Helvetica, sans-serif">Учебный процесс</text><text x="785" y="712" fill="#C8DCEB" font-size="25" font-family="Arial, Helvetica, sans-serif">Лабораторные работы</text><text x="785" y="746" fill="#C8DCEB" font-size="25" font-family="Arial, Helvetica, sans-serif">анализ временных рядов</text><text x="785" y="780" fill="#C8DCEB" font-size="25" font-family="Arial, Helvetica, sans-serif">пример системы</text><text x="120" y="960" fill="#8CA6BB" font-size="22" font-family="Arial, Helvetica, sans-serif">Применимо в задачах анализа технологических процессов и цифровизации производства</text></svg>
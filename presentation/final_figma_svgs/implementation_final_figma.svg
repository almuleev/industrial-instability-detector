<text x="120" y="140" fill="#F0F5FA" font-size="64" font-weight="700" font-family="Arial, Helvetica, sans-serif">Этапы внедрения</text>
<text x="120" y="195" fill="#B4D0E5" font-size="24" font-family="Arial, Helvetica, sans-serif">Как система переходит от MVP к использованию на предприятии</text>
<rect x="120" y="380" width="360" height="240" rx="25" fill="#1A283C" stroke="#50C8FF" stroke-width="3"/><text x="145" y="438" fill="#FFFFFF" font-size="32" font-weight="700" font-family="Arial, Helvetica, sans-serif">1. Пилот</text><text x="145" y="492" fill="#C8DCEB" font-size="24" font-family="Arial, Helvetica, sans-serif">Запуск на архивных данных</text><text x="145" y="526" fill="#C8DCEB" font-size="24" font-family="Arial, Helvetica, sans-serif">конкретного процесса</text><line x1="488" y1="500" x2="530" y2="500" stroke="#50C8FF" stroke-width="6"/><polygon points="530,500 515,490 515,510" fill="#50C8FF"/><rect x="540" y="380" width="360" height="240" rx="25" fill="#1A283C" stroke="#50C8FF" stroke-width="3"/><text x="565" y="438" fill="#FFFFFF" font-size="32" font-weight="700" font-family="Arial, Helvetica, sans-serif">2. Адаптация</text><text x="565" y="492" fill="#C8DCEB" font-size="24" font-family="Arial, Helvetica, sans-serif">Настройка параметров</text><text x="565" y="526" fill="#C8DCEB" font-size="24" font-family="Arial, Helvetica, sans-serif">снижение ложных срабатываний</text><text x="565" y="560" fill="#C8DCEB" font-size="24" font-family="Arial, Helvetica, sans-serif">учёт особенностей объекта</text><line x1="908" y1="500" x2="950" y2="500" stroke="#50C8FF" stroke-width="6"/><polygon points="950,500 935,490 935,510" fill="#50C8FF"/><rect x="960" y="380" width="360" height="240" rx="25" fill="#1A283C" stroke="#50C8FF" stroke-width="3"/><text x="985" y="438" fill="#FFFFFF" font-size="32" font-weight="700" font-family="Arial, Helvetica, sans-serif">3. Интеграция</text><text x="985" y="492" fill="#C8DCEB" font-size="24" font-family="Arial, Helvetica, sans-serif">Подключение через API</text><text x="985" y="526" fill="#C8DCEB" font-size="24" font-family="Arial, Helvetica, sans-serif">встраивание в ИТ-инфраструктуру</text><text x="985" y="560" fill="#C8DCEB" font-size="24" font-family="Arial, Helvetica, sans-serif">автоматизация анализа</text><line x1="1328" y1="500" x2="1370" y2="500" stroke="#50C8FF" stroke-width="6"/><polygon points="1370,500 1355,490 1355,510" fill="#50C8FF"/><rect x="1380" y="380" width="360" height="240" rx="25" fill="#1A283C" stroke="#50C8FF" stroke-width="3"/><text x="1405" y="438" fill="#FFFFFF" font-size="32" font-weight="700" font-family="Arial, Helvetica, sans-serif">4. Масштабирование</text><text x="1405" y="492" fill="#C8DCEB" font-size="24" font-family="Arial, Helvetica, sans-serif">Расширение на другие процессы</text><text x="1405" y="526" fill="#C8DCEB" font-size="24" font-family="Arial, Helvetica, sans-serif">использование в разных подразделениях</text><text x="120" y="950" fill="#8CA6BB" font-size="22" font-family="Arial, Helvetica, sans-serif">От пилота к масштабируемому цифровому решению</text></svg>
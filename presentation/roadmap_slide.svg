<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#0A121E"/>
<stop offset="100%" stop-color="#142A3A"/>
</linearGradient>
</defs>
<rect width="100%" height="100%" fill="url(#bg)"/>

<text x="110" y="140" fill="#F0F5FA" font-size="64" font-weight="700">Внедрение системы</text>
<text x="110" y="200" fill="#B4D0E5" font-size="28">Пошаговый roadmap перехода от MVP к промышленному применению</text>

    <rect x="160" y="400" width="400" height="260" rx="30" fill="#1A283C" stroke="#4A96C8" stroke-width="3"/>
    <text x="190" y="470" fill="#FFFFFF" font-size="34" font-weight="700">1. Пилот</text>
    <text x="190" y="520" fill="#C8DCEB" font-size="26">Анализ архивных данных</text><text x="190" y="556" fill="#C8DCEB" font-size="26">конкретного процесса</text><text x="190" y="592" fill="#C8DCEB" font-size="26">выявление нестабильных режимов</text>
        <line x1="570" y1="530" x2="660" y2="530" stroke="#50C8FF" stroke-width="6"/>
        <polygon points="660,530 640,518 640,542" fill="#50C8FF"/>
        
    <rect x="680" y="400" width="400" height="260" rx="30" fill="#1A283C" stroke="#4A96C8" stroke-width="3"/>
    <text x="710" y="470" fill="#FFFFFF" font-size="34" font-weight="700">2. Настройка</text>
    <text x="710" y="520" fill="#C8DCEB" font-size="26">Подбор параметров</text><text x="710" y="556" fill="#C8DCEB" font-size="26">адаптация под предметную область</text><text x="710" y="592" fill="#C8DCEB" font-size="26">снижение ложных срабатываний</text>
        <line x1="1090" y1="530" x2="1180" y2="530" stroke="#50C8FF" stroke-width="6"/>
        <polygon points="1180,530 1160,518 1160,542" fill="#50C8FF"/>
        
    <rect x="1200" y="400" width="400" height="260" rx="30" fill="#1A283C" stroke="#4A96C8" stroke-width="3"/>
    <text x="1230" y="470" fill="#FFFFFF" font-size="34" font-weight="700">3. Интеграция</text>
    <text x="1230" y="520" fill="#C8DCEB" font-size="26">Подключение через API</text><text x="1230" y="556" fill="#C8DCEB" font-size="26">в существующие системы</text><text x="1230" y="592" fill="#C8DCEB" font-size="26">автоматизация анализа</text>
<text x="110" y="950" fill="#8CA6BB" font-size="22">От пилотного анализа к интеграции в цифровой контур предприятия</text>
</svg>

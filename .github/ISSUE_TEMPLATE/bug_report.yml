name: Bug report
description: Report an unexpected behavior or regression
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please include enough context to reproduce the issue.
        Reports are reviewed on a best-effort basis.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: API returns 500 on valid CSV upload.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `python main.py api`
        2. Send POST /upload with ...
        3. Observe error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What result did you expect?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What happened instead? Include logs/traceback.
    validations:
      required: true

  - type: input
    id: python_version
    attributes:
      label: Python version
      placeholder: "3.11.x"

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, run mode (CLI/UI/API), and any relevant context.
